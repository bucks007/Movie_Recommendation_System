<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Movie Recommender{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'chatbot/chatbot.css' %}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'movie_list' %}">
            Movie Recommender
        </a>
    </div>
    <div class="ms-auto">
        {% if user.is_authenticated %}
            <span class="text-white me-3">Welcome {{ user.username }}</span>
            <a
                href="{% url 'profile' %}"
                class="btn btn-outline-light me-2">
                Profile
            </a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">

                {% csrf_token %}
                <button type="submit"
                        class="btn btn-outline-light">
                    Logout
                </button>
            </form>
        {% else %}
            <a
                href="{% url 'login' %}"
                class="btn btn-outline-light me-2">
                Login
            </a>
            <a
                href="{% url 'register' %}"
                class="btn btn-light">
                Register
            </a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>
{% include "chatbot/chatbot.html" %}

<script src="{% static 'chatbot/chatbot.js' %}"></script>

</body>
</html>
